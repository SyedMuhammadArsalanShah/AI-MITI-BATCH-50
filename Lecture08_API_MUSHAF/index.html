<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FB Style Post Creator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{
background:#f0f2f5;
}

header{
background:#1877f2;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
text-align:center;
}

.container{
display:grid;
grid-template-columns:350px 1fr;
gap:20px;
padding:20px;
}

.editor{

background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);

}

.preview{

display:flex;
justify-content:center;
}

.card{

background:white;
width:650px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
overflow:hidden;

}

.cover{

width:100%;
height:300px;
object-fit:cover;
display:none;

}

.profile{

display:flex;
align-items:center;
padding:15px;

}

.avatar{

width:50px;
height:50px;
border-radius:50%;
background:#1877f2;
color:white;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
font-weight:bold;
margin-right:10px;

}

.content{

padding:0 20px 20px;

}

textarea,input{

width:100%;
padding:12px;
margin-top:10px;
border:1px solid #ddd;
border-radius:8px;

}

button{

width:100%;
padding:12px;
margin-top:15px;
border:none;
background:#1877f2;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;

}

button:hover{

background:#0f5fd0;

}

.actions{

display:flex;
justify-content:space-around;
padding:15px;
border-top:1px solid #ddd;
color:#666;

}

img{

max-width:100%;

}

</style>

</head>
<body>

<header>
Facebook Style Post Creator
</header>

<div class="container">

<div class="editor">

<h3>Create Post</h3>

<input id="name" placeholder="Author Name">

<input id="title" placeholder="Post Title">

<textarea id="post" rows="8" placeholder="Write something..."></textarea>

<input type="file" id="image">

<button onclick="updatePost()">
Publish
</button>

<button onclick="downloadPDF()">
Download PDF
</button>

</div>

<div class="preview">

<div class="card" id="card">

<img id="cover" class="cover">

<div class="profile">

<div class="avatar" id="avatar">
A
</div>

<div>

<h3 id="pname">
Author
</h3>

<small id="date"></small>

</div>

</div>

<div class="content">

<h2 id="ptitle">
Post Title
</h2>

<p id="pcontent">
Your content appears here...
</p>

</div>

<div class="actions">

<span>👍 Like</span>

<span>💬 Comment</span>

<span>↗ Share</span>

</div>

</div>

</div>

</div>

<script>

document.getElementById("date").innerHTML=
new Date().toLocaleDateString();

function updatePost(){

let name=document.getElementById("name").value||"Author";

document.getElementById("pname").innerHTML=name;

document.getElementById("avatar").innerHTML=name.charAt(0).toUpperCase();

document.getElementById("ptitle").innerHTML=
document.getElementById("title").value;

document.getElementById("pcontent").innerHTML=
document.getElementById("post").value.replace(/\n/g,"<br>");

}

image.onchange=e=>{

const file=e.target.files[0];

if(file){

const reader=new FileReader();

reader.onload=function(){

cover.src=this.result;

cover.style.display="block";

}

reader.readAsDataURL(file);

}

}

async function downloadPDF(){

const {jsPDF}=window.jspdf;

const canvas=await html2canvas(document.getElementById("card"),{

scale:2

});

const img=canvas.toDataURL("image/png");

const pdf=new jsPDF("p","mm","a4");

const w=190;

const h=canvas.height*w/canvas.width;

pdf.addImage(img,"PNG",10,10,w,h);

pdf.save("facebook-post.pdf");

}

</script>

</body>
</html>
